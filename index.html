<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/diep-io/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Diep Io</title>
      <script type="module" crossorigin src="/diep-io/assets/index-CAt91ZWV.js"></script>
      <link rel="stylesheet" crossorigin href="/diep-io/assets/index-CBIqQs1h.css">
    </head>
    <body class="ubuntu-small">
        <div id="ui">
            <div id="home-menu">
                <div class="top-left">
                    <div id="loginBtn" class="btn">
                        <p>Log In</p>
                        <div class="top-half"></div>
                        <div class="bottom-half"></div>
                    </div>
                    <div id="shopBtn" class="btn">
                        <p>Shop</p>
                        <div class="top-half"></div>
                        <div class="bottom-half"></div>
                    </div>
                </div>
                <div class="top-right">
                    <div id="gamesBtn" class="btn">
                        <p>Servers</p>
                        <div class="top-half"></div>
                        <div class="bottom-half"></div>
                    </div>
                </div>
                <div class="center-div">
                    <img src="/diep-io/assets/logo-CsYd_oea.png" id="diep-logo" alt="logo"/>
                    <input
                        placeholder="This is the tale of..."
                        maxlength="15"
                        id="playerNameInput"
                    />
                </div>
                <div class="center-div">
                    <div id="startBtn" class="btn">
                        <p id="startBtnLbl">Play!</p>
                        <div class="top-half"></div>
                        <div class="bottom-half"></div>
                    </div>
                </div>
                <div class="advancements"></div>
            </div>
            <div id="game-ui">
                <div id="upgrades">
                    <h3 id="upgrade-count"></h3>
                    <!--<div class="upgrade">
                        <div class="bars">
                            <div class="texts">
                                <p class="title">Health Regen</p>
                                <p class="hotkey">[1]</p>
                            </div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                        <div class="add">
                            <p>+</p>
                        </div>
                    </div>-->
                </div>
                <div id="stats">
                    <h3 class="name" id="playerName">PiGuy141</h3>
                    <div class="progress-bar" id="score">
                        <div class="progress"></div>
                        <h2 class="title" id="scoreTitle">Score: 0</h2>
                    </div>
                    <div class="progress-bar" id="level">
                        <div class="progress" id="levelProgress"></div>
                        <h2 class="title" id="levelTitle">Lvl 1 Tank</h2>
                    </div>
                </div>
                <div id="map">
                    <div id="playerPoint">▲</div>
                </div>
                <div id="left-joystick">
                    <div id="left-inner"></div>
                </div>
                <div id="right-joystick">
                    <div id="right-inner"></div>
                </div>
            </div>
        </div>

    </body>
</html>
