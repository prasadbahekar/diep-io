<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Diep Io</title>
        <link rel="stylesheet" href="./src/style.css" />
    </head>
    <body class="ubuntu-small">
        <div id="ui">
            <div id="home-menu">
                <div class="top-left">
                    <div id="loginBtn" class="btn">
                        <p>Log In</p>
                        <div class="top-half"></div>
                        <div class="bottom-half"></div>
                    </div>
                    <div id="shopBtn" class="btn">
                        <p>Shop</p>
                        <div class="top-half"></div>
                        <div class="bottom-half"></div>
                    </div>
                </div>
                <div class="top-right">
                    <div id="gamesBtn" class="btn">
                        <p>Servers</p>
                        <div class="top-half"></div>
                        <div class="bottom-half"></div>
                    </div>
                </div>
                <div class="center-div">
                    <img src="./src/assets/textures/logo.png" id="diep-logo" alt="logo"/>
                    <input
                        placeholder="This is the tale of..."
                        maxlength="15"
                        id="playerNameInput"
                    />
                </div>
                <div class="center-div">
                    <div id="startBtn" class="btn">
                        <p id="startBtnLbl">
                            <img src="/public/assets/textures/ui/controller/xbox_button_a.svg" alt="">
                            Play!</p>
                        <div class="top-half"></div>
                        <div class="bottom-half"></div>
                    </div>
                </div>
                <div class="advancements"></div>
            </div>
            <div id="game-ui">
                <div id="upgrades">
                    <h3 id="upgrade-count"></h3>
                    <!--<div class="upgrade">
                        <div class="bars">
                            <div class="texts">
                                <p class="title">Health Regen</p>
                                <p class="hotkey">[1]</p>
                            </div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                        <div class="add">
                            <p>+</p>
                        </div>
                    </div>-->
                </div>
                <div id="stats">
                    <h3 class="name" id="playerName">PiGuy141</h3>
                    <div class="progress-bar" id="score">
                        <div class="progress"></div>
                        <h2 class="title" id="scoreTitle">Score: 0</h2>
                    </div>
                    <div class="progress-bar" id="level">
                        <div class="progress" id="levelProgress"></div>
                        <h2 class="title" id="levelTitle">Lvl 1 Tank</h2>
                    </div>
                </div>
                <div id="btm-rt">
                    <div class="controls">
                        <div class="control">
                            <img src="/public/assets/textures/ui/controller/xbox_stick_top_l.svg" alt="" srcset="">
                            <p>Move</p>
                        </div>
                        <div class="control">
                            <img src="/public/assets/textures/ui/controller/xbox_stick_top_r.svg" alt="" srcset="">
                            <p>Aim</p>
                        </div>
                        <div class="control">
                            <img src="/public/assets/textures/ui/controller/xbox_rt_outline.svg" alt="" srcset="">
                            <p>Fire</p>
                        </div>
                        <div class="control">
                            <img src="/public/assets/textures/ui/controller/xbox_dpad_down_outline.svg" alt="" srcset="">
                            <p>Auto Rotate</p>
                        </div>
                    </div>
                    <div id="map">
                        <div id="playerPoint">▲</div>
                    </div>
                </div>
                <div id="left-joystick">
                    <div id="left-inner"></div>
                </div>
                <div id="right-joystick">
                    <div id="right-inner"></div>
                </div>
            </div>
        </div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
